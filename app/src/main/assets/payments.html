<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Payments – EduCRM Pro</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app"></div>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
if (Auth.requireAuth()) {
  const root = document.getElementById('app');
  let editingId = null;
  function render() {
    const list = DB.payments.all();
    const students = DB.students.all();
    const courses = DB.courses.all();
    const smap = Object.fromEntries(students.map(s=>[s.id,s.name]));
    const cmap = Object.fromEntries(courses.map(c=>[c.id,c.title]));
    const totalPaid = list.filter(p=>p.status==='paid').reduce((a,b)=>a+Number(b.amount||0),0);
    const totalPending = list.filter(p=>p.status==='pending').reduce((a,b)=>a+Number(b.amount||0),0);
    root.innerHTML = `
      ${UI.topbar('Payments')}
      <div class="container">
        <div class="stats">
          <div class="stat"><div class="label">Paid</div><div class="value">${UI.fmtMoney(totalPaid)}</div></div>
          <div class="stat"><div class="label">Pending</div><div class="value">${UI.fmtMoney(totalPending)}</div></div>
        </div>
        ${UI.pageHead('Transactions','<button class="btn primary sm" onclick="showForm()">+ Add</button>')}
        <ul class="list">
          ${list.length?list.slice().reverse().map(p=>`<li>
            <div><div class="title">${UI.escape(smap[p.studentId]||'Unknown')} – ${UI.fmtMoney(p.amount)}</div>
              <div class="sub">${UI.escape(cmap[p.courseId]||'')} • ${p.date||''}</div></div>
            <div class="actions">
              <span class="badge ${p.status==='paid'?'green':p.status==='pending'?'amber':'red'}">${p.status}</span>
              <button class="btn ghost sm" onclick="editP('${p.id}')">Edit</button>
              <button class="btn danger sm" onclick="delP('${p.id}')">Del</button>
            </div></li>`).join(''):'<li class="empty">No payments yet</li>'}
        </ul>

        <div class="card" id="formCard" style="display:none">
          <h3 id="formTitle">New payment</h3>
          <form id="pform">
            <div class="form-row"><label>Student</label>
              <select name="studentId" required>
                ${students.map(s=>`<option value="${s.id}">${UI.escape(s.name)}</option>`).join('')}
              </select>
            </div>
            <div class="form-row"><label>Course</label>
              <select name="courseId">
                <option value="">—</option>
                ${courses.map(c=>`<option value="${c.id}">${UI.escape(c.title)}</option>`).join('')}
              </select>
            </div>
            <div class="row">
              <div class="form-row"><label>Amount ($)</label><input class="input" name="amount" type="number" min="0" step="0.01" required></div>
              <div class="form-row"><label>Date</label><input class="input" name="date" type="date" value="${UI.todayStr()}" required></div>
            </div>
            <div class="form-row"><label>Status</label>
              <select name="status">
                <option value="paid">Paid</option>
                <option value="pending">Pending</option>
                <option value="refunded">Refunded</option>
              </select>
            </div>
            <div class="row">
              <button class="btn ghost" type="button" onclick="hideForm()">Cancel</button>
              <button class="btn primary" type="submit">Save</button>
            </div>
          </form>
        </div>
      </div>
      ${UI.bottomnav('payments')}
    `;
    document.getElementById('pform').addEventListener('submit', function(e){
      e.preventDefault();
      const obj = Object.fromEntries(new FormData(this).entries());
      obj.amount = Number(obj.amount||0);
      if (editingId) DB.payments.update(editingId,obj); else DB.payments.add(obj);
      editingId = null; render();
    });
  }
  window.showForm=()=>{document.getElementById('formCard').style.display='block';document.getElementById('formTitle').textContent='New payment';document.getElementById('pform').reset();document.querySelector('#pform [name=date]').value=UI.todayStr();editingId=null;};
  window.hideForm=()=>{document.getElementById('formCard').style.display='none';editingId=null;};
  window.editP=(id)=>{const p=DB.payments.get(id);if(!p)return;editingId=id;document.getElementById('formCard').style.display='block';document.getElementById('formTitle').textContent='Edit payment';const f=document.getElementById('pform');f.studentId.value=p.studentId||'';f.courseId.value=p.courseId||'';f.amount.value=p.amount||0;f.date.value=p.date||UI.todayStr();f.status.value=p.status||'paid';window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});};
  window.delP=(id)=>UI.confirmDelete('Delete payment?',()=>{DB.payments.remove(id);render();});
  render();
}
</script>
</body>
</html>
